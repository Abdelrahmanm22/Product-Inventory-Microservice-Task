
services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: product-inventory-app
        restart: unless-stopped
        working_dir: /var/www/html
        volumes:
            - .:/var/www/html
        networks:
            - laravel
        depends_on:
            - db
            - redis
        environment:
            - DB_CONNECTION=pgsql
            - DB_HOST=db
            - DB_PORT=5432
            - DB_DATABASE=product_inventory
            - DB_USERNAME=laravel
            - DB_PASSWORD=secret
            - REDIS_HOST=redis
            - REDIS_PASSWORD=null
            - REDIS_PORT=6379

    nginx:
        image: nginx:alpine
        container_name: product-inventory-nginx
        restart: unless-stopped
        ports:
            - "${APP_PORT:-8000}:80"
        volumes:
            - ./nginx.conf:/etc/nginx/conf.d/default.conf
            - .:/var/www/html
        networks:
            - laravel
        depends_on:
            - app

    db:
        image: postgres:16-alpine
        container_name: product-inventory-db
        restart: unless-stopped
        ports:
            - "${DB_PORT:-5433}:5432"
        environment:
            POSTGRES_DB: product_inventory
            POSTGRES_USER: laravel
            POSTGRES_PASSWORD: secret
        volumes:
            - postgres_data:/var/lib/postgresql/data
        networks:
            - laravel

    redis:
        image: redis:7-alpine
        container_name: product-inventory-redis
        restart: unless-stopped
        ports:
            - "${REDIS_PORT:-6379}:6379"
        networks:
            - laravel

networks:
    laravel:
        driver: bridge

volumes:
    postgres_data:
